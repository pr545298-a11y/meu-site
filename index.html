<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Capturador de Links</title>
    <style>
        /* Configuração do fundo da página */
        body {
            font-family: 'Arial', sans-serif;
            /* Aqui você pode trocar o link entre aspas pelo link da foto que você quiser */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://i.postimg.cc/y6LzZv9m/Whats-App-Image-2026-05-21-at-23-42-26.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Caixa estilizada do formulário */
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }

        /* Campo de texto moderno */
        input[type="url"] {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input[type="url"]:focus {
            border-color: #007BFF;
        }

        /* Botão moderno */
        button {
            width: 97%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Enviar um Link</h2>
        
        <form action="/enviar" method="POST">
            <input type="url" name="link_usuario" placeholder="Cole o seu link aqui..." required>
            <button type="submit">Enviar Link</button>
        </form>
    </div>

</body>
</html>
